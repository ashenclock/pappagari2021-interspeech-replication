# ===================================================================
#                    MAIN CONFIGURATION
# ===================================================================

seed: 42
device: "cuda"

# --- Data Paths ---
data:
  audio_root: "datasets/sicily_final/audio"
  train_labels: "datasets/sicily_final/splits/train_dev.csv"
  transcripts_root: "datasets/sicily_final/transcripts"
  features_root: "datasets/sicily_final/features"
  test_audio_root: "datasets/sicily_final/audio"
  test_transcripts_root: "datasets/sicily_final/transcripts"
  test_task1_labels: "datasets/sicily_final/splits/test.csv"
  test_task2_labels: "datasets/sicily_final/splits/test.csv"

# ===================================================================
#                   ASR TRANSCRIPTION
# ===================================================================

transcription:
  engine: "whisperx"  # "crisperwhisper", "nemo", or "whisperx"
  overwrite: false

  crisperwhisper:
    model_id: "nyrahealth/CrisperWhisper"
    batch_size: 16
    compute_type: "float16"
    language: "it"

  nemo:
    model_name: "nvidia/parakeet-tdt-0.6b-v3"
    batch_size: 2

  whisperx:
    model_name: "nyrahealth/faster_CrisperWhisper"
    batch_size: 16
    compute_type: "float16"
    language: "it"

# ===================================================================
#                   FEATURE EXTRACTION
# ===================================================================

feature_extraction:
  # Options: "egemaps", "compare", "mfcc_stats", "disvoice_prosody", "whisper_large_v3"
  feature_set: "whisper_large_v3"
  overwrite: false

embedding_extraction:
  name: "whisper_large_v3"
  model_id: "openai/whisper-large-v3"
  pooling_strategy: "mean"
  batch_size: 16

# ===================================================================
#                   TABULAR MODELS (SVM, XGBoost, LR)
# ===================================================================

tabular_model:
  name: "xgboost"  # "svm", "xgboost", or "lr"
  grids:
    svm:
      C: [0.1, 1, 10, 100]
      gamma: ["scale", "auto", 0.1, 0.01]
      kernel: ["rbf", "linear"]
    xgboost:
      n_estimators: [100, 200, 300]
      max_depth: [3, 5, 7]
      learning_rate: [0.01, 0.1, 0.2]
    lr:
      C: [0.01, 0.1, 1, 10]
      penalty: ["l1", "l2"]
      solver: ["liblinear"]

# ===================================================================
#                   EXPERIMENT SETTINGS
# ===================================================================

task: "classification"  # "classification" or "regression"
modality: "text"        # "text" or "audio"

transcription_model_for_training: "parakeet-tdt-0.6b-v3"

k_folds: 10
output_dir: "outputs/experiment_name"

model:
  output_dim: 1
  text:
    name: "Musixmatch/umberto-commoncrawl-cased-v1"
    max_length: 256
    dropout: 0.2
  audio:
    name: "ecapa-tdnn"
    pretrained: "speechbrain/spkrec-ecapa-voxceleb"
    sample_rate: 16000
    trainable_encoder: true
    dropout: 0.1

training:
  epochs: 20
  batch_size: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  early_stopping_patience: 5
  eval_metric: "f1"  # "accuracy", "f1" for classification; "rmse" for regression

# ===================================================================
#                   MODEL FUSION (optional)
# ===================================================================

score_generation_models:
  - output_dir: "outputs/bert_classification_large-v3"
  - output_dir: "outputs/bert_classification_parakeet-tdt-1.1b"
